<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KERNEL — Independent Music Label · Hamburg</title>
  <meta name="description" content="KERNEL — Independent music label from Hamburg. Trap, Lofi & Electronic." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #05080d;
      --bg-card:   #080d14;
      --border:    rgba(104,131,188,0.18);
      --text:      #f1f1ec;
      --text-muted:#6f6f78;
      --accent:    #8a307f;
      --accent-2:  #79a7d3;
      --mono:      'Space Mono', monospace;
      --sans:      'Space Grotesk', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    .wrap { width: 100%; max-width: 480px; margin: 0 auto; padding: 0 20px; }

    nav {
      border-bottom: 1px solid var(--border);
      background: rgba(5,8,13,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 100;
    }
    nav .wrap { display: flex; align-items: center; height: 52px; }
    .nav-wordmark {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    .nav-wordmark span { color: var(--accent-2); }

    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 96px 0 80px;
      border-bottom: 1px solid var(--border);
      background: radial-gradient(58% 50% at 50% 40%, rgba(138,48,127,0.09), transparent 72%);
    }
    .hero .wrap { text-align: center; }
    .hero-label {
      display: block;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 24px;
    }
    .hero-name {
      font-family: var(--mono);
      font-size: clamp(36px, 10vw, 52px);
      font-weight: 700;
      letter-spacing: 0.12em;
      line-height: 1;
      margin-bottom: 16px;
    }
    .hero-name span { color: var(--accent-2); }
    .hero-tagline {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.28em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .artists { padding: 72px 0; border-bottom: 1px solid var(--border); }
    .section-label {
      display: block;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    .section-title {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 36px;
    }
    .artist-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      transition: border-color 0.2s, background 0.2s;
    }
    .artist-card:hover {
      border-color: var(--accent-2);
      background: rgba(121,167,211,0.05);
    }
    .artist-info { display: flex; flex-direction: column; gap: 4px; }
    .artist-name { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.02em; }
    .artist-genre {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .artist-arrow { font-size: 18px; opacity: 0.3; transition: opacity 0.2s, color 0.2s; }
    .artist-card:hover .artist-arrow { opacity: 1; color: var(--accent-2); }

    footer { padding: 40px 0; border-top: 1px solid var(--border); }
    .footer-logo {
      font-family: var(--mono);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .footer-logo span { color: var(--accent-2); }
    .footer-meta {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      line-height: 1.8;
    }
    .footer-meta a { color: var(--text-muted); transition: color 0.2s; }
    .footer-meta a:hover { color: var(--accent-2); }
  </style>
</head>
<body>

<nav>
  <div class="wrap">
    <span class="nav-wordmark">KER<span>N</span>EL</span>
  </div>
</nav>

<section class="hero">
  <div class="wrap">
    <span class="hero-label">// independent music label</span>
    <h1 class="hero-name">KER<span>N</span>EL</h1>
    <p class="hero-tagline">Trap &nbsp;·&nbsp; Lofi &nbsp;·&nbsp; Hamburg</p>
  </div>
</section>

<section class="artists">
  <div class="wrap">
    <span class="section-label">// artists</span>
    <h2 class="section-title">Roster</h2>
    <a href="/d4ryl" class="artist-card">
      <div class="artist-info">
        <span class="artist-name">D4RYL</span>
        <span class="artist-genre">DNA · Trap</span>
      </div>
      <span class="artist-arrow">→</span>
    </a>
  </div>
</section>

<footer>
  <div class="wrap">
    <div class="footer-logo">KER<span>N</span>EL</div>
    <div class="footer-meta">
      ℗ 2026 Kernel &nbsp;·&nbsp; kernelrec.com<br/>
      <a href="mailto:hello@kernelrec.com">hello@kernelrec.com</a> &nbsp;·&nbsp;
      <a href="mailto:sync@kernelrec.com">sync@kernelrec.com</a> &nbsp;·&nbsp;
      <a href="mailto:press@kernelrec.com">press@kernelrec.com</a>
    </div>
  </div>
</footer>

</body>
</html>
